# Configuration for CyberCheat
# Define rules to detect modified clients.
# Each section represents a rule. The section name is the internal identifier.
#
# Parameters:
# name: The display name of the client.
# actions: A list of actions to take. Available: "alert", "kick", "ban".
# channels: A list of channels to check for the brand message. Usually ["minecraft:brand"].
# message_has: A string that the brand message must contain (case-insensitive).
# exclude_channels: A list of channels the client must NOT have registered. Useful for spoofing detection.

[yescheat_spoof]
name = "YesCheat+ (Spoofed Forge)"
actions = ["alert"]
channels = ["minecraft:brand"]
message_has = "forge"
exclude_channels = ["FML|HS", "fml:hs"] # Forge clients register one of these

[aristois]
name = "Aristois Client"
actions = ["alert", "kick"]
channels = ["minecraft:brand"]
message_has = "aristois"

[liquidbounce]
name = "LiquidBounce"
actions = ["alert", "kick"]
channels = ["minecraft:brand"]
message_has = "liquidbounce"

[wurst]
name = "Wurst Client"
actions = ["alert", "kick"]
channels = ["minecraft:brand"]
message_has = "wurst"

[meteor]
name = "Meteor Client"
actions = ["alert", "kick"]
channels = ["minecraft:brand"]
message_has = "meteor"

[fabric]
name = "Fabric"
actions = [] # No action, just for logging/info
channels = ["minecraft:brand"]
message_has = "fabric"
# This is a legitimate mod loader, so no punitive actions.
# We might want to know who uses it for the /cybercheat command.
